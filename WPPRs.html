<!DOCTYPE html>
<html>
<head>
    <title>PR Page</title>
    <link rel="stylesheet" href="GirlyPunk Style Sheet.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia&effect=fire">
    <link href='https://fonts.googleapis.com/css?family=Cute Font' rel='stylesheet'>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia&effect=neon|outline|emboss|shadow-multiple">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        .homec {
                 position: relative;
                 width: 100%;
                 height: 50px;
                }
        .home-button
               {
             position: absolute;
             top: 10px;
             right: 10px;
             background: rgba(0, 0, 0, 0);
             color: rgba(255, 255, 255, 1.0);
             font-size: 30px;
             font-family: "Cute Font", "Courier New", monospace;
             border-bottom: dashed;
             border-top: none;
             border-right: none;
             border-left: none;
             padding-right: 4px;
             padding-left: 4px;
             padding-bottom: 0px;
             margin-bottom: 2px;
             margin-left: 1px;
             margin-right: 1px;
               }
    .home-button:hover {
            color: rgba(0, 255, 145, 0.9);
            font-size: 35px;
            text-shadow: 2px 2px 5px rgba(255, 255, 255, 1.0);
                  }
    .inputPR {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: auto;
              }
    .hiddenTables {
            display: none;
                }
        
     #stretchTable
        {
            color: rgba (255, 0, 57, 1.0);
            display: table;
            width: 80%;
        }
    #stretchTable thead, #prTable tbody {
        display: table-header-group;
        }
    #stretchTable tr {
        display: table-row;
        }
        
    </style>

</head>
<body>

<div style="position: relative; min-height: 50px; padding: 0px;">

    <img src="jetlady.png" style="position: fixed; top: 0px; right: 0; opacity: 0.6; pointer-events: none; filter: blur(2px);">
    <img src="peachgirl.png" style="position: fixed; top: 0px; left: 0px; opacity: 0.6; pointer-events: none; width: 25%; filter: blur(2px);">
    
</div>
    
<div class="homec">

<button class="home-button" onclick="window.location.href='index.html';">Home</button>
    
</div>

    
    <h1 class="font-effect-neon" style="text-align: center; color: black;">PR's and Time's</h1>
    <h2 style="text-align: center;">Ate that shit.</h2>


<ul class="prnav">

    <li><button class="button" onclick="showReps('prRepSection')">Reps</li>
    <li><button class="button" onclick="showReps('prStretchSection')">Stretches</li>
    <li><button class="button">Times</li>
    <li><button class="button">Weight</li>
    <li><button class="button">Hell Day</li>
    
</ul>

    <!--REP SECTION---------------------------->

<div class="hiddenTables" id="prRepSection">

<table id="prTable">
    <thead id="repTHead">
        <tr>
        <th>Date</th>
        <th>Exercise</th>
        <th># of reps</th>
        </tr>
    </thead>
    <tbody id="repTBody">
    </tbody>
    
</table>
    
    <input type="text" id="RepName" placeholder="Exercise Name" class="inputPR">
    <input type="number" id="RepNum" placeholder="Number of Reps" class="inputPR">
    <button id="RepNameBtn" class="indexbutton">Submit</button>
    
</div>

<!---------------STRETCH SECTION------------------------------>
    
<div class="hiddenTables" id="prStretchSection">
    <table id="stretchTable">
        <thead id="stretchTHead">
            <tr>
                <th>Date</th>
                <th>Stretch</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="stretchTBody">
        </tbody>
    </table>
    <input type="text" id="stretchName" placeholder="Stretch" class="inputPR">
    <input type="number" id="stretchNum" placeholder="Time" class="inputPR">
    <button id="stretchBtn" class="indexbutton">Submit</button>

</div>


    <!----------SCRIPTS----------->
    
     <script>
         function showReps(sectionId) {
         const sections = document.getElementsByClassName("hiddenTables");
             for (let i = 0; i < sections.length; i++) {
                 sections[i].style.display = "none";
                 }
             const tableID = document.getElementById(sectionId);
             if (tableID) {
                 tableID.style.display = "block";
                 }
             
         }
    </script>
     <script type="module" src="pr_pageLogic.js"></script>

</body>
</html>
